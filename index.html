<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Fair Board Game Order</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; }
    .box { border: 1px solid #ddd; padding: 12px; margin-top: 12px; }
    input { padding: 6px; margin: 4px; }
    button { padding: 6px 10px; margin: 4px; }
    img { max-width: 100%; margin-top: 10px; border: 1px solid #ccc; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    a { word-break: break-all; }
    code { background: #f5f5f5; padding: 2px 4px; }
  </style>
</head>

<body>

<h2>🎲 Fair Board Game Order Tool</h2>

<!-- IMAGE -->
<div class="box">
  <h3>🖼 Image</h3>
  <div class="row">
    <input id="imgInput" placeholder="Image URL" style="flex:1" />
    <button onclick="applyImage()">Apply image</button>
  </div>
  <img id="imgPreview" />
</div>

<!-- PLAYERS -->
<div class="box">
  <h3>👥 Players</h3>
  <div id="players"></div>
  <button onclick="addPlayer()">+ Add player</button>
</div>

<!-- COMPUTE -->
<div class="box">
  <button onclick="compute()">Compute player order</button>
</div>

<!-- SEED -->
<div class="box">
  <h3>🔑 Seed</h3>
  <div id="seed"></div>
</div>

<!-- RESULT -->
<div class="box">
  <h3>🏁 Result order</h3>
  <ol id="result"></ol>
</div>

<!-- SHARE -->
<div class="box">
  <h3>🔗 Share result</h3>
  <div id="shareLink"></div>
</div>

<script>

/* =========================
   STATE
   ========================= */

let state = {
  image: "",
  players: [
    { name: "admin", secret: "", isAdmin: true }
  ]
};

/* =========================
   SANITIZE
   ========================= */

function sanitizeName(name) {
  return name.replaceAll("|", "").trim();
}

/* =========================
   INIT FROM URL
   ========================= */

(function init() {
  const url = new URL(window.location.href);

  const img = url.searchParams.get("img");
  if (img) state.image = img;

  const pStr = url.searchParams.get("participants");

  if (pStr) {
    const entries = pStr.split("|");

    state.players = [];

    for (let i = 0; i < entries.length; i++) {
      const part = entries[i];
      const dash = part.lastIndexOf("-");

      if (i === 0) {
        state.players.push({
          name: part,
          secret: "",
          isAdmin: true
        });
      } else {
        const name = part.slice(0, dash);
        const secret = part.slice(dash + 1);

        state.players.push({
          name,
          secret,
          isAdmin: false
        });
      }
    }
  }

  renderPlayers();
  applyImageToUI();
  compute();
})();

/* =========================
   RENDER PLAYERS
   ========================= */

function renderPlayers() {
  const container = document.getElementById("players");
  container.innerHTML = "";

  state.players.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "row";

    const name = document.createElement("input");
    name.value = p.name;
    name.style.width = "160px";

    name.oninput = e => {
      p.name = sanitizeName(e.target.value);
      e.target.value = p.name;
    };

    const secret = document.createElement("input");
    secret.placeholder = p.isAdmin ? "admin (no number)" : "secret number";
    secret.value = p.secret;
    secret.style.width = "160px";
    secret.oninput = e => p.secret = e.target.value;

    if (p.isAdmin) secret.disabled = true;

    const del = document.createElement("button");
    del.textContent = "x";
    del.onclick = () => {
      if (p.isAdmin) return;
      state.players.splice(i, 1);
      renderPlayers();
    };

    row.appendChild(name);
    row.appendChild(secret);
    if (!p.isAdmin) row.appendChild(del);

    container.appendChild(row);
  });
}

/* =========================
   ADD PLAYER (FIXED)
   ========================= */

function addPlayer() {
  state.players.push({ name: "player", secret: "", isAdmin: false });
  renderPlayers();
}

/* =========================
   IMAGE
   ========================= */

function applyImage() {
  state.image = document.getElementById("imgInput").value.trim();
  applyImageToUI();
  updateShareLink(); // ✅ only share link updates
}

function applyImageToUI() {
  document.getElementById("imgInput").value = state.image || "";
  document.getElementById("imgPreview").src = state.image || "";
}

/* =========================
   COMPUTE
   ========================= */

function compute() {
  const players = state.players.map(p => p.name);
  const secrets = state.players.slice(1).map(p => p.secret || "");

  const seed = secrets.join("-");

  const shuffled = seededShuffle(players, seed);

  document.getElementById("seed").innerHTML =
    `<code>${seed}</code>`;

  document.getElementById("result").innerHTML =
    shuffled.map(p => `<li>${p}</li>`).join("");

  updateShareLink();
}

/* =========================
   SHARE LINK (CLEAN)
   ========================= */

function updateShareLink() {
  const parts = [];

  for (const p of state.players) {
    const safeName = sanitizeName(p.name);

    if (p.isAdmin) {
      parts.push(safeName);
    } else {
      parts.push(`${safeName}-${p.secret || ""}`);
    }
  }

  const participants = parts.join("|");

  const url = new URL(window.location.origin + window.location.pathname);

  url.searchParams.set("participants", participants);

  if (state.image) {
    url.searchParams.set("img", state.image);
  }

  document.getElementById("shareLink").innerHTML =
    `<a href="${url.toString()}" target="_blank">${url.toString()}</a>`;
}

/* =========================
   SHUFFLE
   ========================= */

function hashString(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return Math.abs(h);
}

function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function seededShuffle(arr, seedStr) {
  const rng = mulberry32(hashString(seedStr));
  const a = [...arr];

  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }

  return a;
}

</script>

</body>
</html>
