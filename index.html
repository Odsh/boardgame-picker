<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Fair Turn Order Picker</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; }
    input, button { padding: 8px; margin: 4px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .box { padding: 10px; border: 1px solid #ddd; margin-top: 10px; }
    code { background: #f5f5f5; padding: 2px 4px; }
  </style>
</head>
<body>

<h2>🎲 Fair Turn Order Picker (Deterministic)</h2>

<div class="box">
  <h3>1. Participants</h3>
  <div class="row">
    <input id="nameInput" placeholder="Add player name" />
    <button onclick="addPlayer()">Add</button>
  </div>
  <div id="players"></div>
</div>

<div class="box">
  <h3>2. Seed (locked once generated)</h3>
  <button onclick="generateSeed()">Generate Seed</button>
  <div>Seed: <code id="seedDisplay">—</code></div>
</div>

<div class="box">
  <h3>3. Result</h3>
  <button onclick="compute()">Compute Order</button>
  <button onclick="verify()">Verify (recompute)</button>
  <ol id="result"></ol>
</div>

<div class="box">
  <h3>4. Shareable link</h3>
  <div id="share"></div>
</div>

<script>
let players = [];
let seed = null;

function updateUI() {
  document.getElementById("players").innerHTML =
    players.map((p, i) => `<div>${i+1}. ${p}</div>`).join("");

  document.getElementById("seedDisplay").textContent = seed || "—";

  const params = new URLSearchParams();
  if (players.length) params.set("p", players.join(","));
  if (seed) params.set("s", seed);
  document.getElementById("share").innerHTML =
    `<code>${location.origin + location.pathname + "?" + params.toString()}</code>`;
}

function addPlayer() {
  const v = document.getElementById("nameInput").value.trim();
  if (!v) return;
  players.push(v);
  document.getElementById("nameInput").value = "";
  updateUI();
}

function generateSeed() {
  if (seed) return;
  const arr = new Uint32Array(4);
  crypto.getRandomValues(arr);
  seed = Array.from(arr).join("-");
  updateUI();
}

function hashSeed(str) {
  // simple deterministic hash → number
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return Math.abs(h);
}

function seededShuffle(arr, seedStr) {
  let rng = mulberry32(hashSeed(seedStr));
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// deterministic PRNG
function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function compute() {
  if (!seed || players.length === 0) return;
  const res = seededShuffle(players, seed);
  render(res);
}

function verify() {
  // recompute from URL state (simulating independent verification)
  const url = new URL(location.href);
  const p = url.searchParams.get("p");
  const s = url.searchParams.get("s");
  if (!p || !s) return;

  const res = seededShuffle(p.split(","), s);
  render(res);
}

function render(res) {
  document.getElementById("result").innerHTML =
    res.map(x => `<li>${x}</li>`).join("");
}

// load from URL
(function init() {
  const url = new URL(location.href);
  const p = url.searchParams.get("p");
  const s = url.searchParams.get("s");

  if (p) players = p.split(",");
  if (s) seed = s;

  updateUI();
})();
</script>

</body>
</html>
