<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Deterministic Turn Order</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; }
    .box { padding: 12px; border: 1px solid #ddd; margin-top: 12px; }
    code { background: #f5f5f5; padding: 2px 4px; }
  </style>
</head>

<body>
<h2>🎲 Deterministic Board Game Order</h2>

<div class="box">
  <h3>Result order</h3>
  <ol id="result"></ol>
</div>

<div class="box">
  <h3>Debug</h3>
  <div id="debug"></div>
</div>

<script>
(function init() {
  const path = window.location.pathname.replace(/^\/+/, "");
  const parts = path.split("-");

  // must be: admin + (name,num)*N
  if (parts.length < 3 || parts.length % 2 === 0) {
    document.body.innerHTML = "<h3>Invalid format</h3><p>Use /admin-player1-num-player2-num...</p>";
    return;
  }

  const admin = parts[0];

  const players = [];
  const secrets = [];

  // include admin as first player (no secret)
  players.push(admin);

  // parse remaining pairs
  for (let i = 1; i < parts.length; i += 2) {
    players.push(parts[i]);
    secrets.push(parts[i + 1]);
  }

  // seed = only secret numbers
  const seed = secrets.join("|");

  const shuffled = seededShuffle(players, seed);

  document.getElementById("result").innerHTML =
    shuffled.map(p => `<li>${p}</li>`).join("");

  document.getElementById("debug").innerHTML = `
    <div><b>Admin:</b> ${admin}</div>
    <div><b>Players:</b> ${players.join(", ")}</div>
    <div><b>Seed (from secrets only):</b> <code>${seed}</code></div>
  `;
})();


// deterministic shuffle
function hashString(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return Math.abs(h);
}

function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function seededShuffle(arr, seedStr) {
  const rng = mulberry32(hashString(seedStr));
  const a = [...arr];

  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }

  return a;
}
</script>

</body>
</html>
